# Video-Based Training Configuration for Deepfake Detection

# Dataset settings
use_huggingface_dataset: false
train_data_path: "../../DATA"            # Root data directory
val_data_path: "../../DATA"              # Root data directory (split handled in script)

# Model settings
model_save_path: "../../models/video_deepfake.pth"
use_pretrained: true                     # Use pre-trained ResNet50
transfer_learning: true                  # Fine-tune pre-trained weights

# Training hyperparameters
batch_size: 4                            # Smaller batch size due to video frame stacking
learning_rate: 0.0001
num_epochs: 20
weight_decay: 1e-5

# Learning rate scheduler
lr_scheduler: "cosine"
lr_schedule:
  step_size: 20
  gamma: 0.1

# Class weights
use_weighted_loss: true

# Video-specific settings
augmentation:
  num_frames_per_video: 10               # Extract 10 frames per video
  random_horizontal_flip: true
  random_vertical_flip: false
  color_jitter:
    brightness: 0.15
    contrast: 0.15
    saturation: 0.15
    hue: 0.05
  resize: 224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

# Early stopping
early_stopping:
  patience: 5
  metric: "val_accuracy"
