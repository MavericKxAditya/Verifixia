# Training configuration for Deepfake Detection Model

# Dataset settings
use_huggingface_dataset: false  # Set to false to use local dataset
train_data_path: "../../DATA" # Root data directory
val_data_path: "../../DATA"   # Root data directory (split handled in script)

# Model settings
model_save_path: "../../models/xception_deepfake.pth"
use_pretrained: true  # Use pre-trained Xception from ImageNet
transfer_learning: true  # Fine-tune pre-trained weights

# Training hyperparameters (optimized)
batch_size: 16
learning_rate: 0.0001
num_epochs: 50
weight_decay: 1e-5
warmup_epochs: 0

# Learning rate scheduler
lr_scheduler: "cosine"
lr_schedule:
  step_size: 20
  gamma: 0.1

# Class weights
use_weighted_loss: true

# Data augmentation settings (enhanced)
augmentation:
  random_horizontal_flip: true
  random_vertical_flip: false
  random_rotation: 10
  color_jitter:
    brightness: 0.15
    contrast: 0.15
    saturation: 0.15
    hue: 0.05
  random_affine:
    degrees: 10
    translate: [0.05, 0.05]
    scale: [0.9, 1.1]
  gaussian_blur: 0.1
  mixup_alpha: 0.1
  resize: 224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

# Early stopping
early_stopping:
  enabled: true
  patience: 15
  metric: "val_accuracy"